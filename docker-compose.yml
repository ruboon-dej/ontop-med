version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ontopmed-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d   # auto-runs on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 10

  ontop:
    image: ontop/ontop:5.2.1
    container_name: ontopmed-ontop
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./ontology:/opt/ontop/input/ontology
      - ./mapping:/opt/ontop/input/mapping
      - ./jdbc/postgresql.jar:/opt/ontop/jdbc/postgresql.jar
    environment:
      ONTOP_ONTOLOGY_FILE: /opt/ontop/input/ontology/idmp-o.owl
      ONTOP_MAPPING_FILE: /opt/ontop/input/mapping/drugs.obda
      ONTOP_PROPERTIES_FILE: /opt/ontop/input/mapping/ontop.properties

volumes:
  postgres_data: